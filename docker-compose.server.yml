version: "3.9"

networks:
  power_net:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: power-backend-server
    env_file:
      - ./.env
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      REDIS_URL: redis://power-redis-server:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - power_net
    ports:
      # Port 5000 is used on the server
      - "5000:5000"
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    container_name: power-redis-server
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - power_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - ./frontend/.env
    container_name: power-frontend-server
    depends_on:
      - backend
    networks:
      - power_net
    ports:
      - "3000:3000"
    restart: unless-stopped
