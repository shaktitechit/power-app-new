version: "3.9"

networks:
  power_net:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: power-backend-local
    env_file:
      - ./.env
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      REDIS_URL: redis://power-redis-local:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - power_net
    ports:
      # Mapped to 5001 on the host to avoid macOS port 5000 conflict (AirPlay Receiver)
      - "5001:5000"
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    container_name: power-redis-local
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - power_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: power-frontend-local
    env_file:
      - ./frontend/.env
    environment:
      # Override to point to the new backend port on the client side
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5001"
    depends_on:
      - backend
    networks:
      - power_net
    ports:
      - "3000:3000"
    restart: unless-stopped
